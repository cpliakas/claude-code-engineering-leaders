decisions:
  - question: Should specialist routing vocabulary be centralized?
    answer: Yes—establish agent descriptions as the single source of truth for trigger phrases and jurisdiction, replacing the Tech Lead's hand-maintained routing table.
    evidence: Reduces duplication, eliminates drift between two sources, and makes specialist registration a one-step process (register the agent, not trigger keywords).
  - question: How should project-local code-area signals be preserved?
    answer: Via a narrow "Project Code Area Overrides" section in the Tech Lead's project memory, storing only signals not derivable from agent descriptions.
    evidence: Prevents loss of project-specific routing (e.g., src/payments/** → payments-specialist) while eliminating duplicated trigger keywords.
  - question: What skills must be updated to support the new model?
    answer: "/add-specialist" (no longer asks for trigger keywords), "/onboard" specialist discovery (simplified Q8), and new "/audit-routing-table" for hygiene checks.
    evidence: Enables simplified registration flow and detects drift (orphan rows, redundant rows, broken pointers) in the thin remaining artifact.
