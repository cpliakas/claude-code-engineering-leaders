decisions:
  - question: Which of the three approaches in the issue should be adopted?
    answer: Option 2 (eliminate trigger-phrase duplication and match against agent descriptions) with a thin supplementary overrides table preserved for project-local code-area signals.
    evidence: Issue #6 scope permits one of three options. Option 2 removes duplication at the root; Option 1 keeps a derived artifact that invites hand-edits; Option 3 only surfaces drift. Per agents/tech-lead.md and skills/add-specialist/SKILL.md, the current routing table conflates trigger vocabulary (already in agent descriptions) with project-local code-area signals (genuinely project-specific), so eliminating the first and keeping the second as a narrow overrides table is the cleanest unification.
  - question: Should the change modify agent description frontmatter schema to add routing metadata?
    answer: No.
    evidence: Issue #6 explicitly places this out of scope.
  - question: How should the Phase 1 output format change?
    answer: It should not change.
    evidence: /plan-implementation parses Phase 1 output against the contract documented at agents/tech-lead.md:156-168. Preserving that contract keeps the skill working without changes.
  - question: Does any spec require a UI verification checklist?
    answer: No.
    evidence: The spec covers Tech Lead routing behavior, memory-file structure, and skill I/O. No HTML, HTMX, JavaScript, CSS, or WebSocket output is produced.
