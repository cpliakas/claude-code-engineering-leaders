reason: OpenSpec change refinement-cell-skill created with validated proposal, design, tasks, and spec artifacts operationalizing the PO/Architect/UX refinement cell as a /refinement-review skill.
decisions:
  - question: What should the new skill be named, given /refine-story already exists as an INVEST scorer?
    answer: /refinement-review, with the refine-story INVEST scorer kept as a complementary, composable tool.
    evidence: The issue lists /refinement-review as one of the suggested names; skills/refine-story/SKILL.md already defines the INVEST-scoring skill, and keeping both clarifies the structural-check vs. perspective-check distinction.
  - question: Should the peer set be dynamically routed or fixed?
    answer: Fixed at product-owner, chief-architect, ux-strategist.
    evidence: The value of the ceremony is that the three perspectives are always on record; allowing the set to be configured invites the exact skipping behavior the skill exists to prevent (issue Problem Statement).
  - question: Should a fourth agent synthesize the peer outputs?
    answer: No. The skill itself assembles the consolidated report from the three verbatim peer responses.
    evidence: Further LLM synthesis would risk re-summarizing the verbatim input and privileging one peer's view; the aggregation is mechanical (collect verdicts, surface disagreements, compute overall verdict).
  - question: What verdict vocabulary should the report use?
    answer: ready / needs-revision / blocked.
    evidence: Three-level vocabulary distinguishes "tweak the wording" from "re-examine the idea" and matches the Chief Architect's existing one-way-door framing in agents/chief-architect.md.
  - question: Does the spec require a UI Verification Checklist?
    answer: No.
    evidence: The skill produces conversational text output; there are no HTML templates, HTMX, JS, CSS, or WebSocket events rendered in a browser, so the pipeline guidance to omit checklists for pure non-UI specs applies.
